<html lang="fr">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    :root{--acc:#7c5cfc;--acc-rgb:124,92,252;--bg:#0b0b15;--card:rgba(255,255,255,.055);--bdr:rgba(255,255,255,.08);--t1:#f2f2f7;--t2:rgba(242,242,247,.55);--t3:rgba(242,242,247,.28);--safe:env(safe-area-inset-bottom,0px);--tabh:82px;--nb:'Nunito',-apple-system,sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;background:#000;}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;color:var(--t1);-webkit-font-smoothing:antialiased;}
    #root{height:100%;display:flex;justify-content:center;}
    .app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden;background:var(--bg);transition:background .4s ease;}
    .scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tabh) + var(--safe) + 12px);scrollbar-width:none;}
    .scroll::-webkit-scrollbar{display:none;}
    .tabbar{position:absolute;bottom:calc(var(--safe) + 10px);left:10px;right:10px;height:66px;border-radius:28px;z-index:100;overflow:hidden;background:rgba(14,14,26,.45);backdrop-filter:blur(48px) saturate(190%) brightness(108%);-webkit-backdrop-filter:blur(48px) saturate(190%) brightness(108%);box-shadow:inset 0 1.5px 0 rgba(255,255,255,.24),inset 0 -.5px 0 rgba(255,255,255,.07),0 0 0 1px rgba(255,255,255,.10),0 20px 56px rgba(0,0,0,.65),0 6px 18px rgba(0,0,0,.35);display:flex;align-items:center;padding:5px;}
    .tabbar::before{content:'';position:absolute;top:0;left:0;right:0;height:52%;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 100%);border-radius:24px 24px 0 0;pointer-events:none;z-index:0;}
    .tab{flex:1;height:100%;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:rgba(255,255,255,.3);border-radius:23px;transition:all .22s cubic-bezier(.34,1.56,.64,1);}
    .tab.on{color:#fff;background:rgba(255,255,255,.15);box-shadow:inset 0 1px 0 rgba(255,255,255,.26),0 2px 10px rgba(0,0,0,.25);}
    .tab-lbl{font-size:9px;font-weight:600;letter-spacing:.01em;}
    .card{background:var(--card);border:1px solid var(--bdr);border-radius:20px;box-shadow:0 2px 14px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.07);}
    .list-wrap{border-radius:18px;overflow:hidden;border:1px solid var(--bdr);box-shadow:0 2px 14px rgba(0,0,0,.22);}
    .list-row{background:var(--card);padding:13px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;}
    .list-row:last-child{border-bottom:none;}
    .list-row-btn{cursor:pointer;}
    .list-row-btn:active{background:rgba(255,255,255,.04);}
    .overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;}
    .sheet{width:100%;max-height:88vh;background:rgba(18,18,30,.85);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,.12);border-bottom:none;border-radius:26px 26px 0 0;box-shadow:inset 0 1.5px 0 rgba(255,255,255,.18),0 -8px 40px rgba(0,0,0,.4);animation:sheetUp .28s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;}
    @keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
    .sheet-header{padding:20px 20px 14px;flex-shrink:0;}
    .sheet-body{flex:1;overflow-y:auto;padding:0 20px 32px;scrollbar-width:none;}
    .sheet-body::-webkit-scrollbar{display:none;}
    .inp{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:var(--t1);padding:11px 14px;font-size:15px;outline:none;font-family:inherit;transition:border-color .18s;}
    .inp:focus{border-color:rgba(var(--acc-rgb),.55);}
    .inp::placeholder{color:var(--t3);}
    .inp[type=date],.inp[type=time]{color-scheme:dark;}
    textarea.inp{resize:none;line-height:1.65;}
    select.inp{appearance:none;cursor:pointer;}
    .btn-acc{width:100%;background:var(--acc);color:#fff;border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(var(--acc-rgb),.4);transition:opacity .12s,box-shadow .2s;}
    .btn-acc:active{opacity:.82;}
    .tog{width:46px;height:26px;border-radius:13px;background:rgba(255,255,255,.14);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
    .tog.on{background:var(--acc);}
    .tog-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:10px;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.35);}
    .tog.on .tog-knob{left:23px;}
    .chk{width:22px;height:22px;border-radius:11px;border:2px solid rgba(255,255,255,.2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;}
    .chk.done{background:var(--acc);border-color:var(--acc);}
    .cday{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;gap:2px;transition:background .12s;user-select:none;}
    .cday:active{background:rgba(255,255,255,.07);}
    .cday.today{background:var(--acc)!important;color:#fff;box-shadow:0 2px 10px rgba(var(--acc-rgb),.4);}
    .cday.sel:not(.today){background:rgba(var(--acc-rgb),.18);color:var(--acc);}
    .cday.grey{color:var(--t3);pointer-events:none;}
    .cday-dot{width:4px;height:4px;border-radius:2px;background:var(--acc);}
    .cday.today .cday-dot{background:rgba(255,255,255,.7);}
    .cbtn{height:68px;border:none;border-radius:22px;font-size:20px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Nunito',-apple-system,sans-serif;transition:transform .08s,opacity .08s;user-select:none;}
    .cbtn:active{transform:scale(.92);opacity:.75;}
    .cbtn.num{background:rgba(255,255,255,.09);color:var(--t1);box-shadow:0 4px 12px rgba(0,0,0,.3),inset 0 1.5px 0 rgba(255,255,255,.12);}
    .cbtn.fn{background:rgba(255,255,255,.16);color:var(--t1);box-shadow:0 4px 12px rgba(0,0,0,.3),inset 0 1.5px 0 rgba(255,255,255,.18);}
    .cbtn.op{background:rgba(var(--acc-rgb),.25);color:var(--acc);box-shadow:0 4px 14px rgba(var(--acc-rgb),.2),inset 0 1.5px 0 rgba(255,255,255,.14);}
    .cbtn.eq{background:linear-gradient(135deg,var(--acc),rgba(var(--acc-rgb),1.0));color:#fff;box-shadow:0 6px 22px rgba(var(--acc-rgb),.5),inset 0 1.5px 0 rgba(255,255,255,.25);}
    .cbtn.sci{height:46px;font-size:12px;font-weight:700;background:rgba(255,255,255,.06);color:var(--t2);border-radius:14px;}
    .page{animation:pageIn .22s cubic-bezier(.16,1,.3,1) both;}
    @keyframes pageIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .slbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);padding:0 4px;margin-bottom:7px;}
    .divider{height:1px;background:var(--bdr);margin:4px 0;}
    .w-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .w-wide{grid-column:span 2;}
    .w-half{grid-column:span 1;}
    .w-edit-overlay{position:absolute;inset:0;border-radius:22px;border:2px solid rgba(var(--acc-rgb),.5);pointer-events:none;z-index:1;}
    .w-edit-btns{position:absolute;top:7px;right:7px;display:flex;gap:4px;z-index:10;}
    .w-edit-btn{width:26px;height:26px;border-radius:8px;border:none;cursor:pointer;color:#fff;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
    .wlbl{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;}
    .subtabs{display:flex;gap:8px;padding:14px 18px 0;flex-shrink:0;}
    .subtab{flex:1;padding:9px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:all .2s;}
    .conv-scroll{padding:0 18px 0;overflow-y:auto;flex:1;scrollbar-width:none;}
    .conv-scroll::-webkit-scrollbar{display:none;}

</head>

/* ══ CLOCK ══ */
function ClockWidget(){
  const [now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  const [h,m,s]=[now.getHours(),now.getMinutes(),now.getSeconds()].map(pad2);
  const [c1,c2]=WC.clock;
  return(<div style={{padding:'18px 20px 16px'}}>
    <div className="wlbl">Heure</div>
    <div style={{lineHeight:1,marginBottom:6}}>
      <span style={gT(c1,c2,68)}>{h}:{m}</span>
      <span style={{...gT(c1,c2,26),opacity:.6,marginLeft:2}}>:{s}</span>
    </div>
    <div style={{fontSize:12,fontWeight:700,color:'var(--t3)',textTransform:'capitalize',marginTop:6}}>
      {now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
    </div>
  </div>);
}

/* ══ WEATHER ══ */
const WMO=c=>{if(c===0)return['Ensoleille','#ffd32a'];if(c<=3)return['Nuageux','var(--t2)'];if(c<=49)return['Brouillard','var(--t3)'];if(c<=59)return['Bruine','#54a0ff'];if(c<=69)return['Pluie','#2e86de'];if(c<=79)return['Neige','#e8f4ff'];if(c<=82)return['Averses','#2e86de'];return['Orage','#ff9f43'];};
function WeatherWidget(){
  const [wx,setWx]=useState(()=>ls.get('ut4_wx',null));
  const [load,setLoad]=useState(false);const [err,setErr]=useState(null);
  const [c1,c2]=WC.wx;
  const go=()=>{if(!navigator.geolocation){setErr('Non disponible');return;}setLoad(true);setErr(null);
    navigator.geolocation.getCurrentPosition(async pos=>{try{
      const r=await window.fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude.toFixed(4)}&longitude=${pos.coords.longitude.toFixed(4)}&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m&timezone=auto`);
      const d=await r.json();const w={...d.current,ts:Date.now()};setWx(w);ls.set('ut4_wx',w);
    }catch{setErr('Erreur');}setLoad(false);},()=>{setErr('Position refusee');setLoad(false);});};
  useEffect(()=>{if(!wx||Date.now()-wx.ts>900000)go();},[]);
  if(load)return<div style={{padding:'28px',textAlign:'center',color:'var(--t3)',fontSize:13}}>...</div>;
  if(!wx||err)return(<div style={{padding:'20px',textAlign:'center'}}>
    <div style={{fontSize:10,color:'var(--t3)',marginBottom:10,fontWeight:700}}>{err||''}</div>
    <button onClick={go} style={{background:`rgba(${hex2rgb(c1)},.2)`,border:'none',borderRadius:12,padding:'8px 16px',color:c1,fontSize:13,fontWeight:800,cursor:'pointer',fontFamily:"'Nunito',sans-serif"}}>Localiser</button>
  </div>);
  const [desc]=WMO(wx.weathercode);
  return(<div style={{padding:'16px'}}>
    <div className="wlbl">Meteo</div>
    <div style={{lineHeight:1}}><span style={gT(c1,c2,54)}>{Math.round(wx.temperature_2m)}</span><span style={{...gT(c1,c2,26),opacity:.75}}>°</span></div>
    <div style={{fontSize:12,fontWeight:700,color:'var(--t2)',marginTop:7}}>{desc}</div>
    <div style={{fontSize:10,fontWeight:600,color:'var(--t3)',marginTop:3}}>Ressenti {Math.round(wx.apparent_temperature)}° · {Math.round(wx.windspeed_10m)} km/h</div>
    <button onClick={go} style={{background:'none',border:'none',padding:'4px 0 0',color:'var(--t3)',fontSize:9,fontWeight:700,cursor:'pointer',letterSpacing:'.06em',textTransform:'uppercase',fontFamily:'inherit',display:'block',marginTop:4}}>Actualiser</button>
  </div>);
}

/* ══ CHRONO WIDGET (home, independant) ══ */
function ChronoWidget(){
  const [running,setRunning]=useState(false);const [elapsed,setElapsed]=useState(0);
  const startRef=useRef(null);const savedRef=useRef(0);const [c1,c2]=WC.chrono;
  useEffect(()=>{if(!running)return;const t=setInterval(()=>setElapsed(savedRef.current+Date.now()-startRef.current),50);return()=>clearInterval(t);},[running]);
  const toggle=()=>{if(running){savedRef.current=elapsed;}else{startRef.current=Date.now();}setRunning(v=>!v);};
  const reset=()=>{setRunning(false);setElapsed(0);savedRef.current=0;};
  const cs=Math.floor((elapsed%1000)/10),ss=Math.floor(elapsed/1000)%60,mm=Math.floor(elapsed/60000)%60;
  return(<div style={{padding:'16px'}}>
    <div className="wlbl">Chrono</div>
    <div style={{marginBottom:14}}><span style={gT(c1,c2,40)}>{pad2(mm)}:{pad2(ss)}</span><span style={{...gT(c1,c2,18),opacity:.55}}>:{pad2(cs)}</span></div>
    <div style={{display:'flex',gap:7}}>
      <button onClick={toggle} style={{flex:1,background:running?`rgba(${hex2rgb('#ff4757')},.2)`:`rgba(${hex2rgb(c1)},.2)`,border:'none',borderRadius:12,padding:'8px 6px',color:running?'#ff4757':c1,fontSize:12,fontWeight:800,cursor:'pointer',fontFamily:"'Nunito',sans-serif"}}>{running?'Pause':elapsed>0?'Reprendre':'Start'}</button>
      {elapsed>0&&<button onClick={reset} style={{background:'rgba(255,255,255,.07)',border:'none',borderRadius:12,padding:'8px 10px',color:'var(--t3)',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:"'Nunito',sans-serif"}}>Reset</button>}
    </div>
  </div>);
}

/* ══ LIVE ACTIVITY WIDGET ══ */
function LiveActivityWidget({onNav}){
  const [live,setLive]=useState(window.__utLive);
  useEffect(()=>{const t=setInterval(()=>setLive({...window.__utLive}),200);return()=>clearInterval(t);},[]);
  const [c1,c2]=WC.live;const [tc1,tc2]=['#fd79a8','#e84393'];
  const openBtn=(col)=><button onClick={()=>onNav('timer')} style={{background:`rgba(${hex2rgb(col)},.18)`,border:'none',borderRadius:10,padding:'5px 12px',color:col,fontSize:11,fontWeight:800,cursor:'pointer',fontFamily:"'Nunito',sans-serif",marginTop:8}}>Ouvrir</button>;
  if(!live||(!live.type)){return(<div style={{padding:'16px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:6,textAlign:'center'}}>
    <div className="wlbl" style={{marginBottom:0}}>En cours</div>
    <div style={{fontSize:11,color:'var(--t3)',fontWeight:600}}>Aucune activite</div>
    {openBtn(c1)}
  </div>);}
  if(live.type==='chrono'){
    const elapsed=live.running?live.saved+Date.now()-live.startTime:live.saved;
    const mm=Math.floor(elapsed/60000)%60,ss=Math.floor(elapsed/1000)%60;
    return(<div style={{padding:'14px 16px'}}>
      <div className="wlbl">Chrono actif</div>
      <div><span style={gT(c1,c2,42)}>{pad2(mm)}:{pad2(ss)}</span></div>
      {openBtn(c1)}
    </div>);
  }
  if(live.type==='timer'){
    const remaining=live.running?Math.max(0,live.endTime-Date.now()):live.savedRemaining;
    const progress=Math.max(0,remaining/live.total);
    const mm=Math.floor(remaining/60000),ss=Math.floor((remaining%60000)/1000);
    const R=30,CIRC=2*Math.PI*R;
    return(<div style={{padding:'12px 16px',display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div className="wlbl" style={{alignSelf:'flex-start'}}>Minuteur</div>
      <div style={{position:'relative',width:80,height:80}}>
        <svg width={80} height={80} viewBox="0 0 80 80">
          <circle cx={40} cy={40} r={R} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth={7}/>
          <circle cx={40} cy={40} r={R} fill="none" stroke={tc1} strokeWidth={7} strokeLinecap="round"
            strokeDasharray={CIRC} strokeDashoffset={CIRC*(1-progress)} transform="rotate(-90 40 40)"
            style={{transition:'stroke-dashoffset .15s linear'}}/>
        </svg>
        <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',...gT(tc1,tc2,16)}}>{pad2(mm)}:{pad2(ss)}</div>
      </div>
      {openBtn(tc1)}
    </div>);
  }
  return null;
}

/* ══ STOCKS WIDGET ══ */
const DEF_TICKERS=['AF.PA','^FCHI','AAPL'];
function StocksWidget(){
  const [data,setData]=useState(()=>{const c=ls.get('ut6_stocks_data',null);return c&&Date.now()-c.ts<300000?c.stocks:null;});
  const [loading,setLoading]=useState(false);
  const [c1,c2]=WC.stocks;
  const fetch_=async()=>{
    setLoading(true);
    try{
      const results=await Promise.all(DEF_TICKERS.map(async sym=>{
        const url=`https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=2d`)}`;
        const r=await window.fetch(url);const d=await r.json();
        const meta=JSON.parse(d.contents).chart.result[0].meta;
        return{sym,name:meta.shortName||sym,price:meta.regularMarketPrice,prev:meta.previousClose,currency:meta.currency};
      }));
      setData(results);ls.set('ut6_stocks_data',{stocks:results,ts:Date.now()});
    }catch{}
    setLoading(false);
  };
  useEffect(()=>{if(!data)fetch_();const t=setInterval(fetch_,300000);return()=>clearInterval(t);},[]);
  return(<div style={{padding:'14px 18px'}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
      <div className="wlbl" style={{marginBottom:0}}>Bourse</div>
      <button onClick={fetch_} style={{background:'none',border:'none',color:'var(--t3)',fontSize:9,fontWeight:700,cursor:'pointer',letterSpacing:'.06em',textTransform:'uppercase',fontFamily:'inherit'}}>Actualiser</button>
    </div>
    {loading&&!data?<div style={{fontSize:12,color:'var(--t3)',fontWeight:600}}>Chargement...</div>
    :data?data.map(s=>{const diff=s.price-s.prev;const pct=(diff/s.prev)*100;const up=diff>=0;const col=up?'#30d158':'#ff453a';
      return(<div key={s.sym} style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:9}}>
        <div><div style={{fontSize:13,fontWeight:800}}>{s.sym}</div><div style={{fontSize:10,color:'var(--t3)',fontWeight:600,maxWidth:110,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{s.name}</div></div>
        <div style={{textAlign:'right'}}>
          <div style={gT(up?c1:'#ff453a',up?c2:'#ff6b81',18)}>{s.price?.toFixed(2)}</div>
          <div style={{fontSize:10,fontWeight:700,color:col}}>{up?'+':''}{diff?.toFixed(2)} ({up?'+':''}{pct?.toFixed(2)}%)</div>
        </div>
      </div>);
    }):<div style={{fontSize:12,color:'var(--t3)',fontWeight:600}}>Indisponible</div>}
  </div>);
}

function CalculatorCore(){
  const [expr,setExpr]=useState('');const [disp,setDisp]=useState('0');const [hist,setHist]=useState('');const [sci,setSci]=useState(false);const [deg,setDeg]=useState(true);const [mem,setMem]=useState(0);
  const calced=useRef(false);
  const D2R=Math.PI/180,R2D=180/Math.PI;
  const fact=n=>{n=Math.round(n);if(n<0||n>170)return NaN;let r=1;for(let i=2;i<=n;i++)r*=i;return r;};
  const evalExpr=useCallback(e=>{try{let s=e.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/\^/g,'**').replace(/π/g,'('+Math.PI+')');s=s.replace(/(?<![0-9.])e(?![0-9+\-*/(])/g,'('+Math.E+')');s=s.replace(/(\d+(?:\.\d+)?)!/g,(_,n)=>String(fact(parseFloat(n))));const d=deg;s=s.replace(/sin\(/g,d?`(x=>Math.sin(x*${D2R}))(`:'Math.sin(').replace(/cos\(/g,d?`(x=>Math.cos(x*${D2R}))(`:'Math.cos(').replace(/tan\(/g,d?`(x=>Math.tan(x*${D2R}))(`:'Math.tan(').replace(/asin\(/g,d?`(x=>Math.asin(x)*${R2D})(`:'Math.asin(').replace(/acos\(/g,d?`(x=>Math.acos(x)*${R2D})(`:'Math.acos(').replace(/atan\(/g,d?`(x=>Math.atan(x)*${R2D})(`:'Math.atan(').replace(/ln\(/g,'Math.log(').replace(/log\(/g,'Math.log10(').replace(/√\(/g,'Math.sqrt(').replace(/∛\(/g,'Math.cbrt(').replace(/abs\(/g,'Math.abs(');const r=Function('"use strict";return('+s+')')();if(typeof r!=='number'||isNaN(r))return'Erreur';if(!isFinite(r))return r>0?'∞':'-∞';const abs=Math.abs(r);if(abs>=1e13||(abs<1e-9&&abs>0))return r.toExponential(4);return String(parseFloat(r.toPrecision(12)));}catch{return'Erreur';}},[deg]);
  const append=s=>{if(calced.current){if(/^[0-9(πe]$/.test(s)||s.endsWith('(')){setExpr(s);setDisp(s);setHist('');calced.current=false;return;}setExpr(disp+s);setDisp(disp+s);setHist('');calced.current=false;return;}const ne=(expr==='0'||expr==='Erreur')&&/^[0-9]$/.test(s)?s:expr+s;setExpr(ne);setDisp(ne);};
  const equals=()=>{if(!expr||expr==='Erreur')return;const r=evalExpr(expr);setHist(expr+' =');setDisp(r);setExpr(r==='Erreur'?'':r);calced.current=true;};
  const clear=()=>{setExpr('');setDisp('0');setHist('');calced.current=false;};
  const back=()=>{if(calced.current||disp==='Erreur'){clear();return;}const n=expr.slice(0,-1)||'';setExpr(n);setDisp(n||'0');};
  const sign=()=>{const s=expr.startsWith('-')?expr.slice(1):'-'+expr;setExpr(s);setDisp(s);};
  const pct=()=>{const r=String(parseFloat(evalExpr(expr))/100);setExpr(r);setDisp(r);calced.current=true;};
  const applyFn=fn=>{const r=String(parseFloat(evalExpr(fn.replace('X',expr))));setExpr(r);setDisp(r);calced.current=true;};
  const ds=disp.length>14?disp.slice(0,14)+'…':disp;const dSize=ds.length>10?32:ds.length>7?40:54;const isErr=disp==='Erreur';
  const STD=[[['AC','fn'],['±','fn'],['%','fn'],['÷','op']],[['7','num'],['8','num'],['9','num'],['×','op']],[['4','num'],['5','num'],['6','num'],['−','op']],[['1','num'],['2','num'],['3','num'],['+','op']],[['0','num'],['.',  'num'],['⌫','fn'],['=','eq']]];
  const SCI=[['sin(','cos(','tan(','π','e'],['asin(','acos(','atan(','ln(','log('],['√(','∛(','x²','xʸ','n!']];
  const doStd=l=>{if(l==='AC')clear();else if(l==='⌫')back();else if(l==='=')equals();else if(l==='±')sign();else if(l==='%')pct();else append(l==='÷'?'÷':l==='×'?'×':l==='−'?'−':l);};
  const doSci=l=>{if(l==='x²')applyFn('(X)*(X)');else if(l==='xʸ')append('^');else if(l==='n!')applyFn('(X)!');else append(l);};

    <div style={{padding:'10px 8px 18px',textAlign:'right',minHeight:100}}>
      <div style={{fontSize:12,color:'var(--t3)',minHeight:18,marginBottom:6,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',direction:'rtl',fontWeight:600}}>{hist||expr}</div>
      <div style={{fontFamily:"'Nunito',-apple-system,sans-serif",fontWeight:900,lineHeight:1,overflow:'hidden',whiteSpace:'nowrap',direction:'rtl',transition:'font-size .15s',...(isErr?{fontSize:32,color:'#ff453a'}:{fontSize:dSize,background:'linear-gradient(135deg,var(--t1),var(--t2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'})}}>{ds}</div>
    </div>

      <button onClick={()=>setSci(v=>!v)} style={{fontSize:11,fontWeight:800,padding:'5px 12px',borderRadius:8,background:sci?'rgba(var(--acc-rgb),.2)':'rgba(255,255,255,.08)',color:sci?'var(--acc)':'var(--t2)',border:'none',cursor:'pointer',fontFamily:"'Nunito',sans-serif"}}>SCI</button>
      {sci&&<button onClick={()=>setDeg(v=>!v)} style={{fontSize:11,fontWeight:800,padding:'5px 12px',borderRadius:8,background:'rgba(255,255,255,.08)',color:'var(--t2)',border:'none',cursor:'pointer',fontFamily:"'Nunito',sans-serif"}}>{deg?'DEG':'RAD'}</button>}
      <div style={{marginLeft:'auto',display:'flex',gap:5}}>
        {[['M+',()=>setMem(parseFloat(evalExpr(expr))||0)],['MR',()=>{const s=String(mem);setExpr(s);setDisp(s);}],['MC',()=>setMem(0)]].map(([lb,fn])=>(<button key={lb} onClick={fn} style={{fontSize:10,fontWeight:700,padding:'4px 8px',borderRadius:7,background:'rgba(255,255,255,.07)',color:'var(--t3)',border:'none',cursor:'pointer',fontFamily:"'Nunito',sans-serif"}}>{lb}</button>))}
      </div>
    </div>
    {sci&&<div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:8}}>{SCI.map((row,ri)=><div key={ri} style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5}}>{row.map(l=><button key={l} className="cbtn sci" onClick={()=>doSci(l)}>{l}</button>)}</div>)}</div>}
    <div style={{display:'flex',flexDirection:'column',gap:8}}>

    </div>
  </div>);
}

  useEffect(()=>{if(cat!=='devises')return;const c=ls.get('ut6_forex',null);if(c&&Date.now()-c.ts<3600000){setRates(c.rates);}else{window.fetch('https://open.er-api.com/v6/latest/EUR').then(r=>r.json()).then(d=>{setRates(d.rates);ls.set('ut6_forex',{rates:d.rates,ts:Date.now()});}).catch(()=>{});};},[cat]);

  const changeCat=id=>{const c=CONV_CATS.find(x=>x.id===id);setCat(id);setFrom(c.ids[0]);setTo(c.ids[1]);setVal('');};
  const swap=()=>{setFrom(to);setTo(from);setVal('');};

  const numVal=parseFloat(val);
  let result=null;
  if(!isNaN(numVal)&&val!==''){
    if(cat==='devises'&&rates){const fr=from==='eur'?1:rates[from.toUpperCase()];const tr=to==='eur'?1:rates[to.toUpperCase()];if(fr&&tr)result=(numVal/fr)*tr;}
    else if(cat!=='devises'){try{const base=TO_BASE[cat][from](numVal);result=FROM_BASE[cat][to](base);}catch{}}
  }

  return(<div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
    <div style={{display:'flex',gap:8,overflowX:'auto',padding:'14px 18px 0',scrollbarWidth:'none',flexShrink:0}}>

    </div>
    <div className="conv-scroll" style={{padding:'16px 18px 0'}}>
      <div style={{...tint(rc1,rc2),padding:'20px',marginBottom:14}}>
        <div className="wlbl">Valeur</div>
        <input type="number" inputMode="decimal" value={val} onChange={e=>setVal(e.target.value)} placeholder="0" style={{background:'none',border:'none',outline:'none',fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:52,color:'var(--t1)',width:'100%',lineHeight:1,marginBottom:16}}/>
        <div className="wlbl">De</div>
        <select value={from} onChange={e=>{setFrom(e.target.value);setVal('');}} className="inp" style={{marginBottom:12,fontWeight:800}}>
          {cc.ids.map((id,i)=><option key={id} value={id}>{cc.labels[i]}</option>)}
        </select>
        <div style={{display:'flex',justifyContent:'center',marginBottom:12}}>
          <button onClick={swap} style={{width:42,height:42,borderRadius:21,background:`rgba(${hex2rgb(rc1)},.2)`,border:`1.5px solid rgba(${hex2rgb(rc1)},.35)`,color:rc1,cursor:'pointer',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center'}}>⇅</button>
        </div>
        <div className="wlbl">Vers</div>
        <select value={to} onChange={e=>{setTo(e.target.value);setVal('');}} className="inp" style={{fontWeight:800}}>
          {cc.ids.map((id,i)=><option key={id} value={id}>{cc.labels[i]}</option>)}
        </select>
      </div>
      <div style={{...tint(rc1,rc2),padding:'20px',marginBottom:24}}>
        <div className="wlbl">Resultat</div>
        <div style={{display:'flex',alignItems:'baseline',gap:8,marginTop:4}}>

/* ══════════════════════════════════════
   MINUTEUR MODULE
══════════════════════════════════════ */
function ChronoSub(){
  const [running,setRunning]=useState(()=>{const l=window.__utLive;return l?.type==='chrono'?l.running:false;});
  const [elapsed,setElapsed]=useState(()=>{const l=window.__utLive;return l?.type==='chrono'?l.saved:0;});
  const [laps,setLaps]=useState([]);
  const startRef=useRef(null);const savedRef=useRef(0);const lastLapRef=useRef(0);
  const [c1,c2]=WC.chrono;

  useEffect(()=>{
    const l=window.__utLive;
    if(l?.type==='chrono'){savedRef.current=l.saved;if(l.running){startRef.current=l.startTime;}}
  },[]);

  useEffect(()=>{
    if(!running)return;
    const t=setInterval(()=>setElapsed(savedRef.current+Date.now()-startRef.current),50);
    return()=>clearInterval(t);
  },[running]);

  useEffect(()=>{
    const live=running?{type:'chrono',running:true,startTime:startRef.current,saved:savedRef.current}
      :elapsed>0?{type:'chrono',running:false,saved:elapsed}:null;
    window.__utLive=live;ls.set('ut6_live',live);
  },[running,elapsed]);

  const toggle=()=>{if(running){savedRef.current=elapsed;}else{startRef.current=Date.now();}setRunning(v=>!v);};
  const reset=()=>{setRunning(false);setElapsed(0);setLaps([]);savedRef.current=0;lastLapRef.current=0;window.__utLive=null;ls.set('ut6_live',null);};
  const lap=()=>{const split=elapsed-lastLapRef.current;lastLapRef.current=elapsed;setLaps(p=>[...p,{total:elapsed,split}]);};

  const cs=Math.floor((elapsed%1000)/10),ss=Math.floor(elapsed/1000)%60,mm=Math.floor(elapsed/60000)%60,hh=Math.floor(elapsed/3600000);
  const btnStyle=(col,active)=>({flex:1,padding:'14px',borderRadius:16,border:'none',background:active?`rgba(${hex2rgb(col)},.2)`:'rgba(255,255,255,.09)',color:active?col:'var(--t2)',fontSize:15,fontWeight:800,cursor:'pointer',fontFamily:"'Nunito',sans-serif",boxShadow:active?`0 4px 20px rgba(${hex2rgb(col)},.2)`:undefined});

  return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'20px 20px 0'}}>
    <div style={{lineHeight:1,marginBottom:32,textAlign:'center'}}>
      {hh>0&&<span style={gT(c1,c2,56)}>{pad2(hh)}:</span>}
      <span style={gT(c1,c2,72)}>{pad2(mm)}:{pad2(ss)}</span>
      <span style={{...gT(c1,c2,28),opacity:.5}}>:{pad2(cs)}</span>
    </div>
    <div style={{display:'flex',gap:10,width:'100%',marginBottom:24}}>
      {elapsed>0&&<button onClick={reset} style={btnStyle('var(--t2)',false)}>Reset</button>}
      {running&&<button onClick={lap} style={btnStyle(c1,true)}>Tour</button>}
      <button onClick={toggle} style={btnStyle(running?'#ff453a':c1,true)}>{running?'Pause':elapsed>0?'Reprendre':'Start'}</button>
    </div>
    {laps.length>0&&<div style={{width:'100%'}}>
      <div className="slbl" style={{marginBottom:8}}>Tours</div>
      <div className="list-wrap">
        {[...laps].reverse().map((l,ri)=>{const idx=laps.length-ri;return(<div key={idx} className="list-row" style={{borderBottom:ri<laps.length-1?'1px solid var(--bdr)':'none'}}>
          <span style={{fontSize:13,fontWeight:700,color:'var(--t3)',minWidth:56}}>Tour {idx}</span>
          <div style={{flex:1}}/>
          <span style={{fontSize:12,color:'var(--t3)',fontWeight:600,marginRight:12}}>{(() =>{const ms=l.split;const p=n=>String(n).padStart(2,'0');return`${p(Math.floor(ms/60000)%60)}:${p(Math.floor(ms/1000)%60)}.${p(Math.floor((ms%1000)/10))}`;})()}</span>
          <span style={{fontSize:14,fontWeight:800}}>{(()=>{const ms=l.total;const p=n=>String(n).padStart(2,'0');return`${p(Math.floor(ms/60000)%60)}:${p(Math.floor(ms/1000)%60)}.${p(Math.floor((ms%1000)/10))}`;})()}</span>
        </div>);})}
      </div>
    </div>}
  </div>);
}

function TimerSub(){
  const PRESETS=[{label:'5 min',ms:5*60000},{label:'10 min',ms:10*60000},{label:'25 min',ms:25*60000,sub:'Pomodoro'},{label:'60 min',ms:60*60000}];
  const initLive=window.__utLive;
  const [duration,setDuration]=useState(initLive?.type==='timer'?initLive.total:25*60000);
  const [remaining,setRemaining]=useState(()=>{const l=window.__utLive;if(l?.type==='timer'){return l.running?Math.max(0,l.endTime-Date.now()):l.savedRemaining;}return 25*60000;});
  const [running,setRunning]=useState(initLive?.type==='timer'?initLive.running:false);
  const [done,setDone]=useState(false);
  const endRef=useRef(initLive?.type==='timer'&&initLive.running?initLive.endTime:null);
  const durRef=useRef(initLive?.type==='timer'?initLive.total:25*60000);
  const [tc1,tc2]=['#fd79a8','#e84393'];
  const CIRC=2*Math.PI*80;

  useEffect(()=>{
    if(!running)return;
    const t=setInterval(()=>{
      const rem=Math.max(0,endRef.current-Date.now());
      setRemaining(rem);
      if(rem<=0){
        setRunning(false);setDone(true);
        window.__utLive=null;ls.set('ut6_live',null);
        if('Notification'in window&&Notification.permission==='granted')new Notification('Minuteur termine !',{body:'Votre minuteur est arrive a zero.'});
        if('vibrate'in navigator)navigator.vibrate([300,100,300,100,300]);
      }
    },100);
    return()=>clearInterval(t);
  },[running]);

  useEffect(()=>{
    const live=running?{type:'timer',running:true,endTime:endRef.current,total:durRef.current}
      :remaining>0&&remaining<durRef.current?{type:'timer',running:false,savedRemaining:remaining,total:durRef.current}:null;
    window.__utLive=live;ls.set('ut6_live',live);
  },[running,remaining]);

  const selectPreset=ms=>{setRunning(false);setDone(false);setDuration(ms);setRemaining(ms);durRef.current=ms;window.__utLive=null;ls.set('ut6_live',null);};
  const toggle=()=>{if(running){setRunning(false);}else{endRef.current=Date.now()+remaining;setRunning(true);setDone(false);}};
  const reset=()=>{setRunning(false);setDone(false);setRemaining(duration);window.__utLive=null;ls.set('ut6_live',null);};

  const progress=Math.max(0,remaining/duration);
  const mm=Math.floor(remaining/60000),ss=Math.floor((remaining%60000)/1000);

  return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'16px 20px 0'}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,width:'100%',marginBottom:28}}>
      {PRESETS.map(p=>(<button key={p.ms} onClick={()=>selectPreset(p.ms)} style={{padding:'8px 4px',borderRadius:14,border:'none',fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:11,cursor:'pointer',lineHeight:1.3,background:duration===p.ms?`rgba(${hex2rgb(tc1)},.2)`:'rgba(255,255,255,.07)',color:duration===p.ms?tc1:'var(--t3)',outline:duration===p.ms?`1.5px solid rgba(${hex2rgb(tc1)},.4)`:'none'}}>
        {p.sub&&<div style={{fontSize:9,opacity:.7,marginBottom:2}}>{p.sub}</div>}{p.label}
      </button>))}
    </div>
    <div style={{position:'relative',width:200,height:200,marginBottom:28}}>
      <svg width={200} height={200} viewBox="0 0 200 200">
        <circle cx={100} cy={100} r={80} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={12}/>
        <circle cx={100} cy={100} r={80} fill="none" stroke={done?'#ff453a':tc1} strokeWidth={12} strokeLinecap="round"
          strokeDasharray={CIRC} strokeDashoffset={CIRC*(1-progress)} transform="rotate(-90 100 100)"
          style={{transition:'stroke-dashoffset .12s linear,stroke .3s'}}/>
      </svg>
      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center'}}>
        <div style={gT(done?'#ff453a':tc1,done?'#ff6b81':tc2,46)}>{pad2(mm)}:{pad2(ss)}</div>
        {done&&<div style={{fontSize:12,fontWeight:800,color:'#ff453a',marginTop:4}}>Termine !</div>}
      </div>
    </div>
    <div style={{display:'flex',gap:10,width:'100%'}}>
      {(remaining<duration||done)&&<button onClick={reset} style={{flex:1,padding:'14px',borderRadius:16,border:'none',background:'rgba(255,255,255,.09)',color:'var(--t2)',fontSize:15,fontWeight:800,cursor:'pointer',fontFamily:"'Nunito',sans-serif"}}>Reset</button>}
      {!done&&<button onClick={toggle} style={{flex:1,padding:'14px',borderRadius:16,border:'none',background:running?'rgba(255,69,58,.2)':`rgba(${hex2rgb(tc1)},.2)`,color:running?'#ff453a':tc1,fontSize:15,fontWeight:800,cursor:'pointer',fontFamily:"'Nunito',sans-serif",boxShadow:running?'0 4px 20px rgba(255,69,58,.2)':`0 4px 20px rgba(${hex2rgb(tc1)},.25)`}}>
        {running?'Pause':remaining===duration?'Start':'Reprendre'}
      </button>}
    </div>
  </div>);
}

function MinuteurModule(){
  const [mode,setMode]=useState(()=>window.__utLive?.type==='timer'?'timer':'chrono');
  const [cc1]=['#ffd32a'];const [tc1]=['#fd79a8'];
  return(<div className="page" style={{paddingTop:22}}>
    <h1 style={{fontSize:34,fontWeight:900,fontFamily:"'Nunito',sans-serif",padding:'0 18px',marginBottom:18}}>Minuteur</h1>
    <div style={{display:'flex',gap:8,padding:'0 18px',marginBottom:20}}>
      {[{id:'chrono',label:'Chrono',c:'#ffd32a'},{id:'timer',label:'Minuteur',c:'#fd79a8'}].map(m=>(
        <button key={m.id} onClick={()=>setMode(m.id)} style={{flex:1,padding:'10px',borderRadius:14,border:'none',fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:14,cursor:'pointer',transition:'all .2s',background:mode===m.id?`rgba(${hex2rgb(m.c)},.2)`:'rgba(255,255,255,.07)',color:mode===m.id?m.c:'var(--t3)',outline:mode===m.id?`1.5px solid rgba(${hex2rgb(m.c)},.4)`:'none'}}>{m.label}</button>
      ))}
    </div>
    {mode==='chrono'?<ChronoSub key="chrono"/>:<TimerSub key="timer"/>}
  </div>);
}

/* ══════════════════════════════════════
   SETTINGS
══════════════════════════════════════ */
function SettingsSheet({onClose}){
  const th=useContext(ThemeCtx);
  const Tog=({val,onC})=><div className={`tog ${val?'on':''}`} onClick={()=>onC(!val)}><div className="tog-knob"/></div>;
  const SR=({label,right,last})=><div className="list-row" style={{borderBottom:last?'none':'1px solid var(--bdr)'}}><span style={{fontSize:15,color:'var(--t1)',flex:1,fontWeight:600}}>{label}</span>{right}</div>;
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="sheet" style={{maxHeight:'92vh'}}>
      <div className="sheet-header"><div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}><h2 style={{fontSize:22,fontWeight:900,fontFamily:"'Nunito',sans-serif"}}>Reglages</h2><XBtn onClick={onClose}/></div></div>
      <div className="sheet-body">
        <div style={{marginBottom:24}}>
          <div className="slbl">Theme</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
            {THEMES.map(t=>{const sel=th.theme.id===t.id;return(<div key={t.id} onClick={()=>th.setTheme(t)} style={{borderRadius:18,overflow:'hidden',cursor:'pointer',position:'relative',aspectRatio:'.72',background:`linear-gradient(145deg,${t.col1} 0%,${t.col2} 50%,${t.col3} 100%)`,outline:sel?`2.5px solid ${th.acc.hex}`:'2.5px solid transparent',outlineOffset:3,boxShadow:'0 4px 18px rgba(0,0,0,.5)',transition:'transform .2s,outline .15s',transform:sel?'scale(1.06)':'scale(1)'}}>
              <div style={{position:'absolute',top:0,left:0,right:0,height:'48%',background:'linear-gradient(180deg,rgba(255,255,255,.14) 0%,transparent 100%)',pointerEvents:'none'}}/>
              <div style={{position:'absolute',top:8,left:8,width:10,height:10,borderRadius:5,background:th.acc.hex,boxShadow:`0 0 8px rgba(${th.acc.rgb},.7)`}}/>
              {sel&&<div style={{position:'absolute',top:6,right:6,width:17,height:17,borderRadius:9,background:th.acc.hex,display:'flex',alignItems:'center',justifyContent:'center'}}><Ico d={I.chk} size={9} sw={2.5}/></div>}
              <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'18px 6px 7px',background:'linear-gradient(0deg,rgba(0,0,0,.55) 0%,transparent 100%)',fontSize:9.5,fontWeight:800,color:'rgba(255,255,255,.88)',textAlign:'center'}}>{t.name}</div>
            </div>);})}
          </div>
        </div>
        <div style={{marginBottom:24}}>
          <div className="slbl">Couleur d'accent</div>
          <div className="card" style={{padding:'16px 18px'}}><div style={{display:'flex',gap:14,justifyContent:'center'}}>{ACCENTS.map(a=><div key={a.id} onClick={()=>th.setAcc(a)} style={{width:38,height:38,borderRadius:14,background:a.hex,cursor:'pointer',outline:th.acc.id===a.id?`3px solid ${a.hex}`:'3px solid transparent',outlineOffset:3,boxShadow:th.acc.id===a.id?`0 0 16px rgba(${a.rgb},.55)`:'none',transition:'all .2s',transform:th.acc.id===a.id?'scale(1.18)':'scale(1)'}}/>)}</div></div>
        </div>
        <div style={{marginBottom:24}}>
          <div className="slbl">Profil</div>
          <div className="list-wrap"><div className="list-row" style={{borderBottom:'none',gap:14}}><span style={{fontSize:15,flex:1,fontWeight:600}}>Prenom</span><input defaultValue={ls.get('ut4_name','Leo')} onBlur={e=>ls.set('ut4_name',e.target.value||'Leo')} style={{background:'none',border:'none',outline:'none',color:'var(--t3)',fontSize:15,fontFamily:'inherit',textAlign:'right',width:100}} placeholder="Leo"/></div></div>
        </div>
        <div style={{marginBottom:24}}>
          <div className="slbl">Affichage</div>
          <div className="list-wrap">
            <SR label="Texte agrandi" right={<Tog val={th.big} onC={th.setBig}/>}/>
            <SR label="Libelles onglets" right={<Tog val={th.lbl} onC={th.setLbl}/>}/>
            <SR label="Debut lundi" last right={<Tog val={th.mon} onC={th.setMon}/>}/>
          </div>
        </div>
        <div style={{marginBottom:24}}>
          <div className="slbl">Notifications</div>
          <div className="list-wrap"><div className="list-row" style={{borderBottom:'none'}}><span style={{fontSize:15,flex:1,fontWeight:600}}>Activer les alertes</span><button onClick={async()=>{if('Notification'in window){const p=await Notification.requestPermission();alert(p==='granted'?'Activees !':'Refusee.');}}} style={{background:'rgba(var(--acc-rgb),.15)',border:'none',borderRadius:10,padding:'6px 14px',color:'var(--acc)',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Autoriser</button></div></div>
        </div>
        <div>
          <div className="slbl">A propos</div>
          <div className="list-wrap">
            <SR label="UniTools" right={<span style={{fontSize:13,color:'var(--t3)',fontWeight:700}}>v6.0</span>}/>
            <SR label="Developpe par" last right={<span style={{fontSize:13,color:'var(--acc)',fontWeight:800,fontFamily:"'Nunito',sans-serif"}}>Leo</span>}/>
          </div>
        </div>
      </div>
    </div>
  </div>);
}

/* ══ SHARED COMPONENTS ══ */
function IcoBtn({onClick,acc,children,style}){return<button onClick={onClick} style={{width:34,height:34,borderRadius:11,background:acc?'var(--acc)':'var(--card)',border:acc?'none':'1px solid var(--bdr)',cursor:'pointer',color:acc?'#fff':'var(--t1)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:acc?`0 3px 12px rgba(var(--acc-rgb),.4)`:undefined,...style}}>{children}</button>;}
function XBtn({onClick}){return<button onClick={onClick} style={{width:30,height:30,borderRadius:10,background:'rgba(255,255,255,.1)',border:'none',cursor:'pointer',color:'var(--t2)',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico d={I.x} size={14}/></button>;}
function MiniLabel({children}){return<div style={{fontSize:10,fontWeight:700,color:'var(--t3)',letterSpacing:'.07em'}}>{children}</div>;}
function ColorSwatch({c,sel,onClick}){return<div onClick={onClick} style={{width:28,height:28,borderRadius:8,background:c,cursor:'pointer',outline:sel?`2px solid ${c}`:'2px solid transparent',outlineOffset:2,transition:'all .15s',transform:sel?'scale(1.15)':'scale(1)',boxShadow:sel?`0 0 12px rgba(${hex2rgb(c)},.5)`:'none'}}/>;}
function RowTog({label,val,onChange}){return<div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}><span style={{fontSize:14,color:'var(--t2)',fontWeight:600}}>{label}</span><div className={`tog ${val?'on':''}`} onClick={()=>onChange(!val)} style={{flexShrink:0}}><div className="tog-knob"/></div></div>;}
function SheetModal({title,onClose,children}){return<div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="sheet" style={{maxHeight:'60vh'}}><div className="sheet-header"><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}><h2 style={{fontSize:19,fontWeight:800}}>{title}</h2><XBtn onClick={onClose}/></div></div><div className="sheet-body">{children}</div></div></div>;}

/* ══════════════════════════════════════
   APP SHELL — 6 TABS
══════════════════════════════════════ */
const TABS=[
  {id:'home', lbl:'Accueil', ico:I.home},
  {id:'cal',  lbl:'Agenda',  ico:I.cal},
  {id:'calc', lbl:'Calcul',  ico:I.calc},
  {id:'notes',lbl:'Notes',   ico:I.note},
  {id:'rem',  lbl:'Rappels', ico:I.bell},
  {id:'timer',lbl:'Minuteur',ico:I.timer},
];

function App(){
  const appRef=useRef(null);
  const [tab,setTab]=useState('home');const [sett,setSett]=useState(false);
  const [acc,setAccS]=useState(()=>ls.get('ut3_acc',ACCENTS[0]));
  const [theme,setThS]=useState(()=>ls.get('ut3_theme',THEMES[0]));
  const [big,setBigS]=useState(()=>ls.get('ut3_big',false));
  const [lbl,setLblS]=useState(()=>ls.get('ut3_lbl',true));
  const [mon,setMonS]=useState(()=>ls.get('ut3_mon',true));
  const setAcc=a=>{setAccS(a);ls.set('ut3_acc',a);};const setTheme=t=>{setThS(t);ls.set('ut3_theme',t);};
  const setBig=v=>{setBigS(v);ls.set('ut3_big',v);};const setLbl=v=>{setLblS(v);ls.set('ut3_lbl',v);};const setMon=v=>{setMonS(v);ls.set('ut3_mon',v);};

  useEffect(()=>{
    const el=appRef.current;if(!el)return;
    const root=document.documentElement;
    root.style.setProperty('--acc',acc.hex);root.style.setProperty('--acc-rgb',acc.rgb);
    root.style.setProperty('--card',theme.card);root.style.setProperty('--bdr',theme.bdr);
    root.style.setProperty('--t1',theme.t1);root.style.setProperty('--t2',theme.t2);root.style.setProperty('--t3',theme.t3);
    root.fontSize=big?'17px':'16px';
    const grad=theme.grad.replace('ACC_RGB',acc.rgb);el.style.background=grad;
  },[acc,theme,big]);

  const render=()=>{switch(tab){
    case'home':  return<HomeModule onNav={id=>setTab(id)} onSettings={()=>setSett(true)}/>;
    case'cal':   return<CalendarModule/>;
    case'calc':  return<CalculatorScreen/>;
    case'notes': return<NotesModule/>;
    case'rem':   return<RemindersModule/>;
    case'timer': return<MinuteurModule/>;
  }};

  return(<ThemeCtx.Provider value={{acc,setAcc,theme,setTheme,big,setBig,lbl,setLbl,mon,setMon}}>
    <div className="app" ref={appRef}>
      <div className="scroll" key={tab}>{render()}</div>
      <div className="tabbar">
        {TABS.map(t=>(<button key={t.id} className={`tab ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>
          <Ico d={t.ico} size={20} sw={tab===t.id?2.2:1.6}/>
          {lbl&&<span className="tab-lbl">{t.lbl}</span>}
        </button>))}
      </div>
      {sett&&<SettingsSheet onClose={()=>setSett(false)}/>}
    </div>
  </ThemeCtx.Provider>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
